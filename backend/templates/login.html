<!DOCTYPE html>
<html>
<head>
    <title>Fleet Intelligence - Login</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e1b4b);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
        .login-box {
            background: rgba(15,23,42,0.95);
            padding: 40px 35px;
            border-radius: 16px;
            width: 380px;
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }
        .login-box h1 {
            color: #818cf8;
            margin-bottom: 10px;
            font-size: 28px;
        }
        .login-box p { color: #64748b; margin-bottom: 30px; }
        input {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #475569;
            background: #1e2937;
            color: white;
            font-size: 15px;
        }
        .login-btn {
            width: 100%;
            padding: 14px;
            margin-top: 15px;
            background: linear-gradient(90deg, #6366f1, #a5b4fc);
            color: black;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
        }
        .demo { font-size: 13px; color: #94a3b8; margin-top: 20px; }
    </style>
</head>
<body>

<div class="login-box">
    <h1>⚡ Fleet AI</h1>
    <p>Login to access the system</p>

    <input type="text" id="username" placeholder="Username" value="admin">
    <input type="password" id="password" placeholder="Password" value="1234">

    <button class="login-btn" onclick="login()">Login Now</button>

    <div class="demo">
        Demo Credentials:<br>
        Username: <strong>admin</strong><br>
        Password: <strong>1234</strong>
    </div>
</div>

<script>
function login() {
    const user = document.getElementById("username").value;
    const pass = document.getElementById("password").value;

    if (user === "admin" && pass === "1234") {
        window.location.href = "/";
    } else {
        alert("Wrong credentials! Use admin / 1234");
    }
}
</script>

</body>
</html>
