<!DOCTYPE html>
<html>
<head>
    <title>Fleet Intelligence Dashboard</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f0f0f, #1a1a1a);
            color: white;
            text-align: center;
        }

        .hero {
            padding: 50px;
            background: rgba(0,0,0,0.7);
        }

        textarea {
            width: 350px;
            height: 120px;
            padding: 10px;
            border-radius: 8px;
            border: none;
        }

        button {
            margin-top: 20px;
            padding: 12px 30px;
            background: linear-gradient(45deg,#007bff,#00c6ff);
            border: none;
            color: white;
            border-radius: 30px;
            cursor: pointer;
        }

        #map {
            height: 400px;
            margin: 40px auto;
            width: 85%;
            border-radius: 15px;
        }

        .card {
            width: 700px;
            margin: 30px auto;
            padding: 30px;
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            display: none;
        }

        .metric {
            font-size: 18px;
            margin: 6px 0;
        }

        .highlight {
            font-size: 22px;
            font-weight: bold;
            color: #00ffcc;
        }
    </style>
</head>
<body>

<div class="hero">
    <h1>Fleet Intelligence System</h1>
    <p>AI-Based Multi-Vehicle Route Optimization | Delhi Hub</p>
</div>

<p>Enter delivery locations (latitude,longitude per line)</p>

<textarea id="locationsInput">28.7041,77.1025
28.5355,77.3910
28.4595,77.0266
28.6692,77.4538</textarea>

<br>
<button onclick="optimize()">Optimize Route</button>

<div id="map"></div>

<div class="card" id="result">
    <h3>Optimization Summary</h3>

    <div class="metric" id="truck1Distance"></div>
    <div class="metric" id="truck1ETA"></div>

    <div class="metric" id="truck2Distance"></div>
    <div class="metric" id="truck2ETA"></div>

    <div class="metric highlight" id="totalETA"></div>
    <div class="metric highlight" id="totalCostSaved"></div>

    <canvas id="metricsChart"></canvas>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

let map = L.map('map').setView([28.6139, 77.2090], 10);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

let routeLine1;
let routeLine2;
let chart;
let truckMarker1;
let truckMarker2;

function animateTruck(route, marker) {
    let i = 0;
    function move() {
        if (i < route.length) {
            marker.setLatLng(route[i]);
            i++;
            setTimeout(move, 1000);
        }
    }
    move();
}

async function optimize() {

    const rawInput = document.getElementById("locationsInput").value;
    const lines = rawInput.split("\n");

    let locations = [];

    for (let line of lines) {
        let parts = line.split(",");
        if (parts.length === 2) {
            locations.push([parseFloat(parts[0]), parseFloat(parts[1])]);
        }
    }

    const response = await fetch('/optimize-route', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ locations: locations })
    });

    const data = await response.json();

    document.getElementById("result").style.display = "block";

    const t1 = data.truck1;
    const t2 = data.truck2;

    document.getElementById("truck1Distance").innerText =
        "Truck 1 Distance: " + t1.metrics.optimized_distance + " km";

    document.getElementById("truck1ETA").innerText =
        "Truck 1 ETA: " + t1.metrics.eta_hours + " hours";

    document.getElementById("truck2Distance").innerText =
        "Truck 2 Distance: " + t2.metrics.optimized_distance + " km";

    document.getElementById("truck2ETA").innerText =
        "Truck 2 ETA: " + t2.metrics.eta_hours + " hours";

    document.getElementById("totalETA").innerText =
        "Fleet Completion Time: " + data.total_eta + " hours";

    document.getElementById("totalCostSaved").innerText =
        "Total Cost Saved: ₹" + data.total_cost_saved;

    if (routeLine1) map.removeLayer(routeLine1);
    if (routeLine2) map.removeLayer(routeLine2);

    routeLine1 = L.polyline(t1.route, {color: 'cyan'}).addTo(map);
    routeLine2 = L.polyline(t2.route, {color: 'orange'}).addTo(map);

    map.fitBounds(routeLine1.getBounds());

    truckMarker1 = L.marker(t1.route[0]).addTo(map);
    truckMarker2 = L.marker(t2.route[0]).addTo(map);

    animateTruck(t1.route, truckMarker1);
    animateTruck(t2.route, truckMarker2);

    if (chart) chart.destroy();

    chart = new Chart(document.getElementById('metricsChart'), {
        type: 'bar',
        data: {
            labels: ['Truck 1', 'Truck 2'],
            datasets: [{
                label: 'Distance (km)',
                data: [
                    t1.metrics.optimized_distance,
                    t2.metrics.optimized_distance
                ],
                backgroundColor: ['cyan', 'orange']
            }]
        }
    });
}

</script>

</body>
</html>
