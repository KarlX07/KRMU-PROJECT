<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fleet AI | Route Optimizer</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css"/>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>

    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Helvetica Neue', 'Helvetica', sans-serif; }
        
        :root {
            --bg-deep: #000000;
            --bg-nav: #121212;
            --bg-panel: rgba(18,18,18,0.9);
            --text-main: #FFFFFF;
            --text-sub: #A0A0A0;
            --accent: #276EF1; /* Uber Blue */
            --border: #262626;
        }

        body { background: var(--bg-deep); color: var(--text-main); height: 100vh; display: flex; overflow: hidden; }

        /* Modern Sidebar (Minimizable potential) */
        .sidebar { 
            width: 260px; background: var(--bg-nav); 
            padding: 25px; border-right: 1px solid var(--border); 
            display: flex; flex-direction: column; z-index: 1010;
        }
        .brand { font-size: 22px; font-weight: 800; margin-bottom: 40px; color: var(--text-main); }
        .brand span { color: var(--accent); }

        .nav-link {
            padding: 14px 20px; margin: 8px 0; border-radius: 8px;
            color: var(--text-sub); text-decoration: none; font-size: 15px; transition: 0.2s;
            display: flex; align-items: center;
        }
        .nav-link:hover { background: rgba(39, 110, 241, 0.05); color: #FFF; }
        .nav-link.active { background: rgba(39, 110, 241, 0.1); color: #FFF; font-weight: 600; }
        .nav-icon { margin-right: 15px; font-size: 18px; }

        /* Main Map Content Area */
        .main-content { flex: 1; position: relative; }
        #map { width: 100%; height: 100vh; z-index: 1; }

        /* Modern Control Panel Float */
        .control-panel {
            position: absolute; top: 25px; left: 25px;
            background: var(--bg-panel); padding: 30px;
            border-radius: 12px; width: 340px;
            border: 1px solid var(--border); z-index: 1000;
            backdrop-filter: blur(15px); box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }
        
        h3 { font-size: 13px; color: var(--text-sub); margin-bottom: 15px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }

        /* Custom Modern Inputs */
        textarea, select {
            width: 100%; padding: 14px; margin-bottom: 18px;
            border-radius: 8px; border: 1px solid #333;
            background: #000000; color: white; font-size: 14px; transition: 0.2s;
        }
        textarea { height: 140px; font-family: 'Courier New', monospace; resize: none; line-height: 1.5; }
        textarea:focus, select:focus { outline: none; border-color: var(--accent); }

        .optimize-btn {
            width: 100%; padding: 18px; border-radius: 8px; border: none;
            background: #FFFFFF; color: #000000;
            font-weight: 700; font-size: 16px; cursor: pointer; transition: 0.2s;
            text-transform: uppercase; letter-spacing: 0.5px;
        }
        .optimize-btn:active { background: #E0E0E0; }

        /* Sleek Stats Panel Metrics */
        .stats-float {
            position: absolute; top: 25px; right: 25px;
            display: flex; flex-direction: column; gap: 12px; z-index: 1000;
        }
        .stat-block {
            background: var(--bg-panel); padding: 16px 20px; border-radius: 12px; 
            border: 1px solid var(--border); min-width: 200px;
            backdrop-filter: blur(15px);
        }
        .stat-label { font-size: 13px; color: var(--text-sub); margin-bottom: 5px; }
        .stat-val { font-size: 24px; font-weight: 700; color: #FFF; }
        .stat-unit { font-size: 16px; color: var(--text-sub); font-weight: 400; margin-left: 5px; }
        #improvement { color: #05A357; }

        /* Modern Modern Loading Overlay */
        #loadingOverlay {
            position: absolute; inset: 0; background: rgba(0,0,0,0.85);
            display: none; align-items: center; justify-content: center;
            flex-direction: column; z-index: 2000; backdrop-filter: blur(5px);
        }
        .spinner { width: 45px; height: 45px; border: 4px solid #141414; border-top-color: #FFF; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }

    </style>
</head>

<body>

<div class="sidebar">
    <div class="brand">Fleet<span>AI</span></div>
    <a href="/" class="nav-link active"><span class="nav-icon">🗺️</span> <span>Optimizer</span></a>
    <a href="/dashboard" class="nav-link"><span class="nav-icon">📊</span> <span>Dashboard</span></a>
</div>

<div class="main-content">
    <div id="map"></div>

    <div id="loadingOverlay">
        <div class="spinner"></div>
        <p style="color:var(--text-sub);">Calculating optimal paths...</p>
    </div>

    <div class="control-panel">
        <h3>📍 Delivery Points</h3>
        <textarea id="locationsInput">28.7041,77.1025
28.5355,77.3910
28.4595,77.0266
28.6692,77.4538
28.6139,77.2090</textarea>

        <h3>🚚 Active Dispatch Fleet</h3>
        <select id="numTrucks">
            <option value="1">1 Truck (Pilot)</option>
            <option value="2" selected>2 Trucks</option>
            <option value="3">3 Trucks</option>
            <option value="4">4 Trucks</option>
        </select>

        <button class="optimize-btn" onclick="optimizeRoute()">🚀 Start Optimization</button>
    </div>

    <div class="stats-float">
        <div class="stat-block"><div class="stat-label">Route Improvement</div><div class="stat-val" id="improvement">-- <span class="stat-unit">%</span></div></div>
        <div class="stat-block"><div class="stat-label">Cost Saved</div><div class="stat-val" id="costSaved">₹--</div></div>
        <div class="stat-block"><div class="stat-label">Fuel Savings</div><div class="stat-val" id="fuelSaved">-- <span class="stat-unit">L</span></div></div>
        <div class="stat-block"><div class="stat-label">ETA Hours</div><div class="stat-val" id="eta">-- <span class="stat-unit">hrs</span></div></div>
    </div>
</div>

<script>
let map = L.map('map', { zoomControl: false }).setView([28.6139, 77.2090], 11);
L.control.zoom({ position: 'bottomright' }).addTo(map);

// Modern DARK Tiles for Optimizer
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { attribution: '&copy; CartoDB' }).addTo(map);

let trucksData = [], polylines = [], stopMarkers = [];
let warehouseMarker = null;
let animationId = null;

// Premium Warehouse Icon (Glowing building)
const warehouseIconIcon = L.icon({ iconUrl: "https://cdn-icons-png.flaticon.com/512/3059/3059518.png", iconSize: [45,45] });

// Premium Stop Icons (Small white glowing delivery points)
const createStopIconIcon = () => L.divIcon({
    className: 'stop-point',
    html: '<div style="width:12px; height:12px; background:#FFF; border-radius:50%; border:2px solid #FFF; box-shadow:0 0 15px rgba(255,255,255,0.7);"></div>',
    iconSize: [12, 12]
});

// Premium Truck Icons (Modern white dots with massive glow for different colors)
const createTruckPointIcon = (color) => L.divIcon({
    className: 'truck-point',
    html: `<div style="width:16px; height:16px; background:#FFFFFF; border-radius:50%; border:3px solid #000; box-shadow:0 0 20px ${color}, 0 0 30px ${color};"></div>`,
    iconSize: [16, 16]
});

async function optimizeRoute() {
    // Show Loading
    document.getElementById("loadingOverlay").style.display = "flex";
    
    // Clear previous elements
    polylines.forEach(p => map.removeLayer(p));
    stopMarkers.forEach(m => map.removeLayer(m));
    if (warehouseMarker) map.removeLayer(warehouseMarker);
    if(animationId) cancelAnimationFrame(animationId);
    
    trucksData = []; stopMarkers = [];

    // Process inputs
    const lines = document.getElementById("locationsInput").value.split("\n");
    const deliveryLocations = [];
    for (let l of lines) {
        const [lat, lng] = l.split(",").map(x => parseFloat(x.trim()));
        if (!isNaN(lat)) deliveryLocations.push([lat, lng]);
    }

    const numTrucks = parseInt(document.getElementById("numTrucks").value);

    // FETCH Optimized Data
    const res = await fetch("/optimize-route", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({locations:deliveryLocations, num_trucks:numTrucks})
    });

    const data = await res.json();
    document.getElementById("loadingOverlay").style.display = "none";

    // Update Top-Right Metrics Panel
    document.getElementById("costSaved").textContent = "₹" + data.total_cost_saved_inr;
    document.getElementById("fuelSaved").innerHTML = (data.comparison.random_total - data.comparison.optimized_total).toFixed(2) + ' <span class="stat-unit">L</span>';
    document.getElementById("improvement").innerHTML = data.comparison.improvement_percent + ' <span class="stat-unit">%</span>';
    document.getElementById("eta").innerHTML = data.total_eta_hours + ' <span class="stat-unit">hrs</span>';

    // RENDER Optimized Map Elements
    const routeColors = ["#0CC","#FFC107","#E91E63","#8F00FF"]; // Neon/Uber Blue, Gold, Pink, Purple

    // Warehouse
    warehouseMarker = L.marker(data.warehouse, {icon: warehouseIconIcon})
        .addTo(map)
        .bindTooltip("Dispatch Center", {permanent:true, className: 'uber-tooltip', offset: [0, 20]});

    for (let truck of data.trucks) {
        // Neon Route Line (Semi-Transparent Neon Cyan default)
        const pathCoords = truck.geometry.map(c => [c[1], c[0]]);
        const poly = L.polyline(pathCoords, { color: routeColors[truck.truck_id-1 % 4], weight: 5, opacity: 0.8 }).addTo(map);
        polylines.push(poly);

        // Active Glowing Truck Marker
        const marker = L.marker(pathCoords[0], {icon: createTruckPointIcon(routeColors[truck.truck_id-1 % 4])})
            .addTo(map)
            .bindTooltip("Active Truck " + truck.truck_id, {permanent:true, className: 'uber-tooltip', offset: [0, -20]});

        trucksData.push({marker:marker, path:pathCoords});

        // Small glowing delivery points
        truck.route.forEach((point, idx) => {
            if (idx > 0) { // Dont place on warehouse again
                const m = L.marker(point, {icon: createStopIconIcon()}).addTo(map);
                stopMarkers.push(m);
            }
        });
    }

    let animationStep = 0;

    // 🔥 MODIFIED ANIMATION FOR STABLE Dispatches (Speed FIXED at 0.05)
    function animate() {
        animationStep += 0.05; // 🚀 FIXED SPEED. Pehle 0.3 thi, stable 0.05 stable flow ke liye.

        trucksData.forEach(t=>{
            const i = Math.floor(animationStep);
            if(i < t.path.length){
                const p1 = t.path[i];
                const p2 = t.path[i+1] || p1;

                // Simple linear interpolation
                const lat = p1[0] + (p2[0]-p1[0])*(animationStep-i);
                const lng = p1[1] + (p2[1]-p1[1])*(animationStep-i);

                t.marker.setLatLng([lat, lng]);
            }
        });

        animationId = requestAnimationFrame(animate);
    }

    animate(); // Start simulation
}
</script>

<style>
    .uber-tooltip { background: rgba(0,0,0,0.8) !important; color: #FFF !important; border: 1px solid #333 !important; border-radius: 4px !important; font-size: 11px !important; padding: 4px 8px !important; }
    .leaflet-tooltip-left:before { border-left-color: #333 !important; }
    .leaflet-tooltip-right:before { border-right-color: #333 !important; }
</style>

</body>
</html>
