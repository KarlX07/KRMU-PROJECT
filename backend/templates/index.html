<!DOCTYPE html>
<html>
<head>
    <title>Fleet Intelligence - Route Optimizer</title>

    <!-- ✅ FIXED LEAFLET CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css"/>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>

    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #fff; height: 100vh; display: flex; }

        .sidebar { width: 260px; background: linear-gradient(180deg, #1e1b4b, #0f172a); padding: 25px 20px; border-right: 1px solid rgba(255,255,255,0.1); }
        .sidebar h1 { color: #818cf8; font-size: 24px; margin-bottom: 35px; }

        .nav-item {
            padding: 14px 18px;
            margin: 8px 0;
            border-radius: 10px;
            color: #94a3b8;
            text-decoration: none;
            display: block;
        }

        .nav-item:hover, .nav-item.active {
            background: rgba(129,140,248,0.25);
            color: white;
        }

        .main { flex: 1; position: relative; }
        #map { width: 100%; height: 100vh; }

        .control-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(15,23,42,0.96);
            padding: 22px;
            border-radius: 14px;
            width: 320px;
            border: 1px solid rgba(255,255,255,0.12);
            z-index: 1000;
        }

        .control-panel h3 { color: #94a3b8; margin-bottom: 10px; }

        select, textarea, button {
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            border-radius: 8px;
            border: 1px solid #475569;
            background: #1e2937;
            color: white;
        }

        textarea { height: 130px; font-family: monospace; }

        .optimize-btn {
            background: linear-gradient(90deg, #6366f1, #a5b4fc);
            color: black;
            font-weight: bold;
            cursor: pointer;
        }

        .metrics {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 1000;
        }

        .card {
            background: rgba(15,23,42,0.96);
            padding: 16px 20px;
            border-radius: 12px;
            min-width: 190px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .label { font-size: 13px; color: #94a3b8; }
        .value { font-size: 20px; font-weight: bold; color: #38bdf8; }

        #loadingOverlay {
            position: absolute;
            inset: 0;
            background: rgba(15,23,42,0.9);
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            z-index: 2000;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 6px solid rgba(255,255,255,0.2);
            border-top-color: #818cf8;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>

<body>

<div class="sidebar">
    <h1>⚡ Fleet AI</h1>
    <a href="/" class="nav-item active">🗺 Route Optimizer</a>
    <a href="/dashboard" class="nav-item">📊 Dashboard</a>
    <a href="/driver" class="nav-item">🚚 Driver App</a>
</div>

<div class="main">
    <div id="map"></div>

    <div id="loadingOverlay">
        <div class="spinner"></div>
        <p>Optimizing routes...</p>
    </div>

    <div class="control-panel">
        <h3>📍 Delivery Points</h3>

        <textarea id="locationsInput">28.7041,77.1025
28.5355,77.3910
28.4595,77.0266
28.6692,77.4538
28.6139,77.2090</textarea>

        <h3>🚚 Trucks</h3>

        <select id="numTrucks">
            <option value="2">2 Trucks</option>
            <option value="3">3 Trucks</option>
            <option value="4">4 Trucks</option>
        </select>

        <button class="optimize-btn" onclick="optimizeRoute()">🚀 Optimize</button>
    </div>

    <div class="metrics">
        <div class="card"><div class="label">Total Distance</div><div class="value" id="totalDistance">-- km</div></div>
        <div class="card"><div class="label">Fuel Saved</div><div class="value" id="fuelSaved">-- L</div></div>
        <div class="card"><div class="label">Cost Saved</div><div class="value" id="costSaved">-- ₹</div></div>
        <div class="card"><div class="label">Max ETA</div><div class="value" id="eta">-- hrs</div></div>
        <div class="card"><div class="label">Route Improvement</div><div class="value" id="improvement">-- %</div></div>
    </div>
</div>

<script>
let map = L.map('map').setView([28.6139, 77.2090], 11);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let trucks = [], polylines = [], stopMarkers = [];
let warehouseMarker = null;
let animation = null;

const warehouseIcon = L.icon({
    iconUrl: "https://cdn-icons-png.flaticon.com/512/3059/3059518.png",
    iconSize: [45,45]
});

const truckIcon = L.icon({
    iconUrl: "https://cdn-icons-png.flaticon.com/512/1995/1995520.png",
    iconSize: [40,40]
});

const stopIcon = L.icon({
    iconUrl: "https://cdn-icons-png.flaticon.com/512/854/854878.png",
    iconSize: [28,28]
});

async function optimizeRoute() {

    document.getElementById("loadingOverlay").style.display = "flex";

    const lines = document.getElementById("locationsInput").value.split("\n");
    const locations = [];

    for (let l of lines) {
        const [lat, lng] = l.split(",").map(x => parseFloat(x.trim()));
        if (!isNaN(lat)) locations.push([lat, lng]);
    }

    const num = parseInt(document.getElementById("numTrucks").value);

    const res = await fetch("/optimize-route", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({locations:locations, num_trucks:num})
    });

    const data = await res.json();
    document.getElementById("loadingOverlay").style.display = "none";

    document.getElementById("totalDistance").textContent = data.comparison.optimized_total + " km";
    document.getElementById("fuelSaved").textContent = (data.comparison.optimized_total * 0.2).toFixed(2) + " L";
    document.getElementById("costSaved").textContent = "₹" + data.total_cost_saved_inr;
    document.getElementById("eta").textContent = data.total_eta_hours + " hrs";
    document.getElementById("improvement").textContent = data.comparison.improvement_percent + " %";

    polylines.forEach(p => map.removeLayer(p));
    stopMarkers.forEach(m => map.removeLayer(m));
    if (warehouseMarker) map.removeLayer(warehouseMarker);
    if(animation) cancelAnimationFrame(animation);

    const colors = ["#06b6d4","#f97316","#a78bfa","#fbbf24"];
    trucks = [];

    warehouseMarker = L.marker(data.warehouse, {icon: warehouseIcon})
        .addTo(map)
        .bindTooltip("🏭 Warehouse", {permanent:true});

    for (let truck of data.trucks) {

        const path = truck.geometry.map(c => [c[1], c[0]]);

        const poly = L.polyline(path, {
            color: colors[truck.truck_id-1],
            weight: 6
        }).addTo(map).bindTooltip("Truck " + truck.truck_id + " Route");

        polylines.push(poly);

        const marker = L.marker(path[0], {icon: truckIcon})
            .addTo(map)
            .bindTooltip("🚚 Truck " + truck.truck_id, {permanent:true});

        trucks.push({marker:marker, path:path});

        truck.route.forEach((point, idx) => {
            if (idx > 0) {
                const m = L.marker(point, {icon: stopIcon})
                    .addTo(map)
                    .bindPopup("📍 Delivery Point");

                stopMarkers.push(m);
            }
        });
    }

    let step = 0;

    function animate() {
        step += 0.3;

        trucks.forEach(t=>{
            const i = Math.floor(step);
            if(i < t.path.length){
                const p1 = t.path[i];
                const p2 = t.path[i+1] || p1;

                const lat = p1[0] + (p2[0]-p1[0])*(step-i);
                const lng = p1[1] + (p2[1]-p1[1])*(step-i);

                t.marker.setLatLng([lat, lng]);
            }
        });

        animation = requestAnimationFrame(animate);
    }

    animate();
}
</script>

</body>
</html>
