<!DOCTYPE html>
<html>
<head>
    <title>🚚 Driver App - Fleet Intelligence</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #0f172a;
            color: white;
        }

        #map { height: 75vh; }

        .controls {
            padding: 10px;
            background: #1e293b;
        }

        button {
            padding: 10px;
            margin: 5px;
            cursor: pointer;
        }

        .status {
            font-size: 14px;
            margin-top: 5px;
        }
    </style>
</head>

<body>

<div class="controls">
    <select id="vehicleSelect">
        <option value="">Select Vehicle</option>
        {% for v in vehicles %}
        <option value="{{ v.id }}">{{ v.vehicle_name }} - {{ v.driver_name }}</option>
        {% endfor %}
    </select>

    <button onclick="startTracking()">Start</button>
    <button onclick="stopTracking()">Stop</button>

    <p>Lat: <span id="lat">--</span></p>
    <p>Lng: <span id="lng">--</span></p>
    <p class="status" id="status">Status: Idle</p>
</div>

<div id="map"></div>

<script>
let map = L.map('map').setView([28.6139, 77.2090], 12);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let marker = null;
let socket = null;
let watchId = null;

function startTracking() {
    const vehicleId = document.getElementById("vehicleSelect").value;

    if (!vehicleId) {
        alert("Select vehicle first");
        return;
    }

    document.getElementById("status").textContent = "Status: Connecting...";

    // ✅ FIX: handle https (ngrok) properly
    const protocol = location.protocol === "https:" ? "wss" : "ws";
    socket = new WebSocket(`${protocol}://${location.host}/ws/driver/${vehicleId}`);

    socket.onopen = () => {
        console.log("WebSocket Connected");
        document.getElementById("status").textContent = "Status: Live Tracking";

        if (!navigator.geolocation) {
            alert("Geolocation not supported");
            return;
        }

        watchId = navigator.geolocation.watchPosition(
            (pos) => {
                const lat = pos.coords.latitude;
                const lng = pos.coords.longitude;

                console.log("LOCATION:", lat, lng);

                document.getElementById("lat").textContent = lat.toFixed(5);
                document.getElementById("lng").textContent = lng.toFixed(5);

                // Send to backend
                socket.send(JSON.stringify({ lat, lng }));

                // Update map
                if (!marker) {
                    marker = L.marker([lat, lng]).addTo(map);
                } else {
                    marker.setLatLng([lat, lng]);
                }

                map.setView([lat, lng], 15);
            },
            (err) => {
                console.log("FULL GPS ERROR:", err);

                let msg = "";
                switch(err.code) {
                    case 1:
                        msg = "Permission denied ❌";
                        break;
                    case 2:
                        msg = "Position unavailable 📡";
                        break;
                    case 3:
                        msg = "Timeout ⏳";
                        break;
                    default:
                        msg = err.message;
                }

                alert("GPS ERROR: " + msg);
                document.getElementById("status").textContent = "Status: GPS Error";
            },
            {
                enableHighAccuracy: true,
                maximumAge: 0,
                timeout: 10000
            }
        );
    };

    socket.onerror = () => {
        alert("WebSocket connection failed ❌");
        document.getElementById("status").textContent = "Status: Connection Failed";
    };
}

function stopTracking() {
    if (watchId !== null) {
        navigator.geolocation.clearWatch(watchId);
    }

    if (socket) {
        socket.close();
    }

    document.getElementById("status").textContent = "Status: Stopped";
    alert("Tracking stopped");
}
</script>

</body>
</html>
