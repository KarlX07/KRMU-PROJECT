<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fleet Driver App | Live Tracking</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css"/>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>

    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Helvetica Neue', sans-serif; }
        body { background: #000; color: #FFF; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        #map { flex: 1; width: 100%; z-index: 1; }

        .top-ui {
            position: absolute; top: 0; width: 100%;
            background: linear-gradient(180deg, rgba(0,0,0,0.95) 0%, transparent 100%);
            padding: 15px 20px; z-index: 1000; display: flex; justify-content: space-between; align-items: center;
        }
        .status-pill { display: flex; align-items: center; font-size: 12px; color: #A0A0A0; padding: 5px 12px; background: rgba(0,0,0,0.5); border-radius: 20px; border: 1px solid #333; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #555; margin-right: 8px; }
        .live .status-dot { background: #05A357; box-shadow: 0 0 10px #05A357; }
        .live { color: #FFF; border-color: #05A357; }

        .bottom-ui {
            position: absolute; bottom: 0; width: 100%; background: rgba(18,18,18,0.98); padding: 20px;
            z-index: 1000; border-top: 1px solid #262626; border-radius: 15px 15px 0 0;
        }
        select { width: 100%; padding: 15px; background: #000; border: 1px solid #333; color: #FFF; border-radius: 10px; margin-bottom: 15px; font-size: 16px; }
        .btn { width: 100%; padding: 15px; border-radius: 10px; border: none; font-size: 16px; font-weight: 700; cursor: pointer; text-transform: uppercase; }
        .btn-start { background: #FFF; color: #000; }
        .btn-stop { background: #000; color: #FF4444; border: 2px solid #FF4444; display: none; }

        /* Geofence Alert Toast */
        #geofenceAlert {
            position: fixed; top: 70px; left: 50%; transform: translateX(-50%);
            background: #05A357; color: white; padding: 10px 20px; border-radius: 30px;
            font-weight: 600; z-index: 2000; display: none; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

<div id="geofenceAlert">📍 Destination Reached!</div>

<div class="top-ui">
    <div style="font-weight:800;">Fleet<span style="color:#276EF1;">AI</span> Dispatch</div>
    <div class="status-pill" id="statusPill"><div class="status-dot"></div> <span id="statusText">Disconnected</span></div>
</div>

<div id="map"></div>

<div class="bottom-ui">
    <select id="vehicleSelect">
        <option value="">Select Vehicle</option>
        {% for v in vehicles %}
        <option value="{{ v.id }}">{{ v.vehicle_name }}</option>
        {% endfor %}
    </select>
    <button id="startBtn" class="btn btn-start" onclick="startRide()">Start Dispatch</button>
    <button id="stopBtn" class="btn btn-stop" onclick="stopRide()">End Ride</button>
</div>

<script>
    let map = L.map('map', { zoomControl: false }).setView([28.6139, 77.2090], 14);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

    let marker, socket, watchId;
    let deliveryPoints = []; 
    let routePoints = []; // To store coordinates of stops

    // Helper: Calculate distance between two points in KM
    function getDistance(lat1, lon1, lat2, lon2) {
        const R = 6371; // Earth radius in km
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                  Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    async function startRide() {
        const vId = document.getElementById("vehicleSelect").value;
        if(!vId) return alert("Select vehicle!");

        // 1. Fetch Optimized Route
        const res = await fetch("/optimize-route", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ locations: [[28.6139, 77.2090], [28.62, 77.22], [28.60, 77.23]], num_trucks: 1 })
        });
        const data = await res.json();
        
        // Save delivery stops for Geofencing
        routePoints = data.trucks[0].route;

        // Draw Route & Markers
        const path = data.trucks[0].geometry.map(c => [c[1], c[0]]);
        L.polyline(path, {color: "#00FFFF", weight: 5}).addTo(map);
        
        routePoints.forEach((p, i) => {
            const stopMarker = L.circleMarker(p, {
                radius: 8, color: '#FFF', fillColor: '#FFF', fillOpacity: 0.8
            }).addTo(map).bindTooltip("Stop " + i);
            deliveryPoints.push({ coords: p, marker: stopMarker, reached: false });
        });

        // 2. Start WebSocket & GPS
        const protocol = location.protocol === "https:" ? "wss" : "ws";
        socket = new WebSocket(`${protocol}://${location.host}/ws/driver/${vId}`);

        watchId = navigator.geolocation.watchPosition((pos) => {
            const { latitude, longitude } = pos.coords;
            
            // Update Marker
            if(!marker) {
                marker = L.marker([latitude, longitude]).addTo(map);
            } else {
                marker.setLatLng([latitude, longitude]);
            }
            map.setView([latitude, longitude]);

            // ✅ GEOFENCING LOGIC
            deliveryPoints.forEach(point => {
                const dist = getDistance(latitude, longitude, point.coords[0], point.coords[1]);
                if (dist < 0.05 && !point.reached) { // 50 meters range
                    point.reached = true;
                    point.marker.setStyle({color: '#05A357', fillColor: '#05A357'}); // Turn Green
                    
                    // Show Toast Alert
                    const toast = document.getElementById("geofenceAlert");
                    toast.style.display = "block";
                    setTimeout(() => toast.style.display = "none", 3000);
                    
                    // Notify Server
                    socket.send(JSON.stringify({event: "geofence_arrival", lat: latitude, lng: longitude}));
                }
            });

            if(socket.readyState === WebSocket.OPEN) {
                socket.send(JSON.stringify({lat: latitude, lng: longitude}));
            }
        }, err => console.error(err), { enableHighAccuracy: true });

        // UI Updates
        document.getElementById("startBtn").style.display = "none";
        document.getElementById("stopBtn").style.display = "block";
        document.getElementById("statusPill").classList.add("live");
        document.getElementById("statusText").innerText = "Live tracking";
    }

    function stopRide() {
        if(watchId) navigator.geolocation.clearWatch(watchId);
        if(socket) socket.close();
        location.reload();
    }
</script>
</body>
</html>
